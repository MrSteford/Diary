<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1920px;
    height: 1080px;
    background: transparent;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    color: #00ff41;
  }
  
  /* Рамка тепловизора — закруглённые углы */
  .thermal-frame {
    position: absolute;
    top: 25px; left: 25px;
    right: 25px; bottom: 25px;
    border: 2px solid #00ff41;
    border-radius: 12px;
    box-shadow: inset 0 0 60px rgba(0, 255, 65, 0.06);
    pointer-events: none;
  }
  
  .frame-corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: #00ff41;
    border-style: solid;
  }
  .fc-tl { top: 5px; left: 5px; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
  .fc-tr { top: 5px; right: 5px; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
  .fc-bl { bottom: 5px; left: 5px; border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
  .fc-br { bottom: 5px; right: 5px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }
  
  /* Шкала температур */
  .temp-scale {
    position: absolute;
    right: 40px;
    top: 120px;
    bottom: 120px;
    width: 30px;
    background: linear-gradient(to bottom, #ff0000, #ffff00, #00ff00, #00ccff, #0000ff);
    border: 1px solid #00ff41;
    border-radius: 4px;
    opacity: 0.8;
  }
  .temp-labels {
    position: absolute;
    right: 75px;
    top: 120px;
    bottom: 120px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 1px;
  }
  
  /* Верхняя панель тепловизора */
  .thermal-top {
    position: absolute;
    top: 35px; left: 50px; right: 120px;
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  
  /* Прицельная рамка тепловизора */
  .thermal-reticle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 180px; height: 180px;
    border: 1px solid #00ff41;
    border-radius: 6px;
    opacity: 0.7;
    pointer-events: none;
  }
  .thermal-reticle::before,
  .thermal-reticle::after {
    content: '';
    position: absolute;
    background: #00ff41;
  }
  .thermal-reticle::before {
    top: -1px; left: 40px; right: 40px; height: 1px;
  }
  .thermal-reticle::after {
    left: -1px; top: 40px; bottom: 40px; width: 1px;
  }
  
  .thermal-dot {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 4px; height: 4px;
    background: #ff0000;
    box-shadow: 0 0 10px #ff0000;
    pointer-events: none;
    animation: thermalBlink 0.8s infinite;
  }
  
  @keyframes thermalBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
  
  /* Данные тепловизора внизу */
  .thermal-info {
    position: absolute;
    bottom: 35px;
    left: 50px;
    right: 120px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    letter-spacing: 1px;
    opacity: 0.8;
  }
  
  .thermal-data span {
    margin-right: 25px;
  }
  
  /* Сканирующая волна */
  .heat-wave {
    position: absolute;
    left: 25px; right: 25px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #ff6600, #ff0000, #ff6600, transparent);
    box-shadow: 0 0 20px #ff4400;
    animation: heatScan 3s ease-in-out infinite;
    opacity: 0.4;
    pointer-events: none;
  }
  
  @keyframes heatScan {
    0% { top: 25px; }
    100% { top: calc(100% - 25px); }
  }
</style>
</head>
<body>

<div class="thermal-frame">
  <div class="frame-corner fc-tl"></div>
  <div class="frame-corner fc-tr"></div>
  <div class="frame-corner fc-bl"></div>
  <div class="frame-corner fc-br"></div>
</div>

<div class="heat-wave"></div>

<div class="thermal-reticle">
  <div class="thermal-dot"></div>
</div>

<div class="temp-scale"></div>
<div class="temp-labels">
  <span>+120°</span>
  <span>+80°</span>
  <span>+40°</span>
  <span>0°</span>
  <span>-20°</span>
</div>

<div class="thermal-top">
  <span>T-MODE: ACTIVE</span>
  <span>IR SPECTRUM</span>
  <span>SENS: HIGH</span>
</div>

<div class="thermal-info">
  <div class="thermal-data">
    <span>TGT: 36.6°C</span>
    <span>AMB: 22.1°C</span>
    <span>EMIS: 0.98</span>
  </div>
  <span>FLIR-X9</span>
</div>

</body>
</html>
