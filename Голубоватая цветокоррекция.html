<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1920px;
    height: 1080px;
    background: transparent;
    overflow: hidden;
    pointer-events: none;
  }
  
  .color-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    /* Голубоватый оттенок — регулируйте прозрачность */
    background: rgba(0, 180, 220, 0.08);
    mix-blend-mode: overlay;
  }
  
  /* Виньетка — затемнение по краям */
  .vignette {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 20, 40, 0.5) 100%);
    pointer-events: none;
  }
  
  /* Лёгкая зернистость */
  .noise {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
  }
  
  /* Тонкие горизонтальные полосы — как на мониторе */
  .scanlines {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="color-overlay"></div>
  <div class="vignette"></div>
  <div class="noise"></div>
  <div class="scanlines"></div>
</body>
</html>
