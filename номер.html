<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 350px;
    height: 120px;
    background: transparent;
    font-family: 'Share Tech Mono', monospace;
    color: #00e5ff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .widget-box {
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(0, 229, 255, 0.35);
    border-radius: 4px;
    padding: 16px 22px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    text-align: center;
    min-width: 280px;
  }
  
  .log-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 8px;
    text-shadow: 0 0 6px rgba(0,0,0,0.9);
  }
  
  .log-number {
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 4px;
    color: #ffd740;
    text-shadow: 0 0 14px rgba(255,215,64,0.6), 0 0 3px #000;
    margin-bottom: 10px;
    cursor: pointer;
    user-select: none;
  }
  
  .hint {
    font-size: 9px;
    letter-spacing: 1px;
    opacity: 0.5;
    margin-top: 6px;
  }
  
  .btn-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 6px;
  }
  
  .ctrl-btn {
    background: rgba(0, 229, 255, 0.1);
    border: 1px solid rgba(0, 229, 255, 0.4);
    color: #00e5ff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 5px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
    user-select: none;
  }
  
  .ctrl-btn:hover {
    background: rgba(0, 229, 255, 0.25);
    box-shadow: 0 0 12px rgba(0,229,255,0.3);
  }
  
  .ctrl-btn:active {
    background: rgba(255, 215, 64, 0.3);
    border-color: #ffd740;
    color: #ffd740;
  }
  
  .flash {
    animation: flashAnim 0.3s ease-out;
  }
  
  @keyframes flashAnim {
    0% { transform: scale(1.15); color: #ffffff; text-shadow: 0 0 25px #ffd740; }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<div class="widget-box">
  <div class="log-label">LOG ENTRY</div>
  <div class="log-number" id="logDisplay" title="Нажмите для смены номера">#0001</div>
  <div class="btn-row">
    <button class="ctrl-btn" id="btnPrev" title="Предыдущий лог">◀ PREV</button>
    <button class="ctrl-btn" id="btnNext" title="Следующий лог">NEXT ▶</button>
    <button class="ctrl-btn" id="btnReset" title="Сбросить на #0001">↺ RST</button>
  </div>
  <div class="hint">НАЖМИТЕ КНОПКУ ИЛИ КЛАВИШУ R</div>
</div>

<script>
const logDisplay = document.getElementById('logDisplay');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const btnReset = document.getElementById('btnReset');

// Загружаем сохранённый номер
let currentLog = parseInt(localStorage.getItem('poker_table_log_num') || '1');
if (isNaN(currentLog) || currentLog < 1) currentLog = 1;

function updateDisplay() {
  logDisplay.textContent = '#' + String(currentLog).padStart(4, '0');
}

function flashDisplay() {
  logDisplay.classList.remove('flash');
  void logDisplay.offsetWidth; // reflow
  logDisplay.classList.add('flash');
}

function incrementLog() {
  currentLog++;
  localStorage.setItem('poker_table_log_num', currentLog);
  updateDisplay();
  flashDisplay();
}

function decrementLog() {
  if (currentLog > 1) {
    currentLog--;
    localStorage.setItem('poker_table_log_num', currentLog);
    updateDisplay();
    flashDisplay();
  }
}

function resetLog() {
  currentLog = 1;
  localStorage.setItem('poker_table_log_num', currentLog);
  updateDisplay();
  flashDisplay();
}

// Кнопки
btnNext.addEventListener('click', incrementLog);
btnPrev.addEventListener('click', decrementLog);
btnReset.addEventListener('click', resetLog);

// Клик по номеру = увеличить
logDisplay.addEventListener('click', incrementLog);

// Клавиатура: R = следующий лог, Shift+R = предыдущий, 0 = сброс
document.addEventListener('keydown', function(e) {
  // Игнорируем если фокус в поле ввода (на всякий случай)
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  
  if (e.key === 'r' || e.key === 'R') {
    if (e.shiftKey) {
      decrementLog();
    } else {
      incrementLog();
    }
    e.preventDefault();
  }
  
  if (e.key === '0' && e.ctrlKey) {
    resetLog();
    e.preventDefault();
  }
});

// Начальное отображение
updateDisplay();

console.log('%c[LOG WIDGET] %cГотов. Текущий лог: %c#' + String(currentLog).padStart(4, '0'),
  'color:#00e5ff', 'color:#fff', 'color:#ffd740');
console.log('%cУправление: клик по номеру / кнопки / клавиша R (Shift+R назад)',
  'color:#888');
</script>
</body>
</html>
