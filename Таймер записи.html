<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 400px;
    height: 80px;
    background: transparent;
    font-family: 'Share Tech Mono', monospace;
    color: #00e5ff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .timer-container {
    display: flex;
    align-items: center;
    gap: 15px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(0, 229, 255, 0.35);
    border-radius: 4px;
    padding: 10px 28px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,0,0,0.2);
  }
  
  .timer-label {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
    text-shadow: 0 0 6px rgba(0,0,0,0.9);
  }
  
  .timer-value {
    font-size: 36px;
    letter-spacing: 5px;
    font-weight: bold;
    color: #ffffff;
    text-shadow: 0 0 12px rgba(0,229,255,0.8), 0 0 3px #000;
  }
  
  .rec-indicator {
    width: 10px; height: 10px;
    background: #ff1744;
    border-radius: 50%;
    box-shadow: 0 0 10px #ff1744;
    animation: recBlink 0.7s infinite;
  }
  
  @keyframes recBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
</style>
</head>
<body>

<div class="timer-container">
  <div class="rec-indicator"></div>
  <span class="timer-label">MISSION TIME</span>
  <span class="timer-value" id="timer">00:00:00</span>
</div>

<script>
const timerEl = document.getElementById('timer');
const startTime = Date.now();

function updateTimer() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const hh = String(Math.floor(elapsed / 3600)).padStart(2, '0');
  const mm = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
  const ss = String(elapsed % 60).padStart(2, '0');
  timerEl.textContent = `${hh}:${mm}:${ss}`;
}

updateTimer();
setInterval(updateTimer, 1000);
</script>
</body>
</html>
