<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 500px;
    height: 200px;
    background: transparent;
    font-family: 'Share Tech Mono', monospace;
    color: #00e5ff;
    overflow: hidden;
    position: relative;
  }
  
  .scope-container {
    position: absolute;
    bottom: 10px;
    left: 10px;
    right: 10px;
    top: 30px;
    border: 1px solid rgba(0, 229, 255, 0.3);
    background: rgba(0, 0, 0, 0.5);
    border-radius: 4px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
  }
  
  canvas {
    position: absolute;
    left: 0;
  }
  
  .scope-label {
    position: absolute;
    top: 5px;
    left: 15px;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.8;
    text-shadow: 0 0 6px rgba(0,0,0,0.9);
  }
  
  .scope-data {
    position: absolute;
    top: 5px;
    right: 15px;
    font-size: 11px;
    letter-spacing: 1px;
    opacity: 0.7;
    text-shadow: 0 0 6px rgba(0,0,0,0.9);
  }
  
  .grid-h, .grid-v {
    position: absolute;
    background: rgba(0, 229, 255, 0.06);
    pointer-events: none;
  }
  .grid-h { left: 0; right: 0; height: 1px; }
  .grid-v { top: 0; bottom: 0; width: 1px; }
  
  /* Кнопка ручного запуска */
  .start-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    border: 1px solid #00e5ff;
    color: #00e5ff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    padding: 12px 24px;
    cursor: pointer;
    text-transform: uppercase;
    z-index: 10;
    transition: all 0.3s;
    border-radius: 4px;
    box-shadow: 0 0 15px rgba(0,229,255,0.2);
  }
  .start-btn:hover {
    background: rgba(0,229,255,0.15);
    box-shadow: 0 0 25px rgba(0,229,255,0.4);
  }
  .start-btn.hidden {
    display: none !important;
  }

  /* Панель ошибок и подсказок */
  .error-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.95);
    color: #ff5252;
    padding: 15px;
    font-size: 12px;
    display: none;
    z-index: 100;
    text-align: center;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    line-height: 1.4;
  }
  .close-btn {
    margin-top: 10px;
    background: transparent;
    border: 1px solid #ff5252;
    color: #ff5252;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 5px 15px;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .close-btn:hover {
    background: rgba(255, 82, 82, 0.15);
  }
</style>
</head>
<body>

<div class="scope-label">AUDIO ANALYZER</div>
<div class="scope-data" id="peak-db">PEAK: -∞ dB</div>

<div class="scope-container" id="scope-box">
  <canvas id="waveCanvas"></canvas>
  <canvas id="spectrumCanvas"></canvas>
  <div class="grid-h" style="top:25%"></div>
  <div class="grid-h" style="top:50%"></div>
  <div class="grid-h" style="top:75%"></div>
  <div class="grid-v" style="left:25%"></div>
  <div class="grid-v" style="left:50%"></div>
  <div class="grid-v" style="left:75%"></div>
</div>

<button class="start-btn" id="startBtn" onclick="initAudio()">🔑 Разрешить микрофон</button>

<div class="error-overlay" id="errorOverlay">
  <div id="errorText"></div>
  <button class="close-btn" onclick="hideError()">✕ Закрыть</button>
</div>

<script>
const waveCanvas = document.getElementById('waveCanvas');
const spectrumCanvas = document.getElementById('spectrumCanvas');
const peakEl = document.getElementById('peak-db');
const box = document.getElementById('scope-box');
const startBtn = document.getElementById('startBtn');
const errorOverlay = document.getElementById('errorOverlay');
const errorText = document.getElementById('errorText');

let audioCtx, analyser, source;
let isRunning = false;
let timeData, freqData;

function resizeCanvases() {
  const rect = box.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;

  waveCanvas.width = w;
  waveCanvas.height = h / 2;
  waveCanvas.style.width = w + 'px';
  waveCanvas.style.height = (h / 2) + 'px';
  waveCanvas.style.top = '0px';

  spectrumCanvas.width = w;
  spectrumCanvas.height = h / 2;
  spectrumCanvas.style.width = w + 'px';
  spectrumCanvas.style.height = (h / 2) + 'px';
  spectrumCanvas.style.top = (h / 2) + 'px';
}

function showError(htmlText) {
  errorText.innerHTML = htmlText;
  errorOverlay.style.display = 'flex';
}

function hideError() {
  errorOverlay.style.display = 'none';
}

function hideButton() {
  startBtn.classList.add('hidden');
}

// Попытка фонового автозапуска (работает, если доступ уже был выдан ранее)
async function autoInit() {
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      return; // Тихо пропускаем, ждем ручного клика пользователя
    }
    const stream = await navigator.mediaDevices.getUserMedia({ 
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
    });
    await setupAudio(stream);
    hideButton();
  } catch(e) {
    console.log('Автозапуск не удался (требуется клик):', e.message);
  }
}

// Запуск при клике на кнопку «Разрешить микрофон»
async function initAudio() {
  hideError();

  // Если браузер Streamlabs заблокировал медиа-интерфейсы
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    if (window.location.protocol === 'file:') {
      showError(
        "<strong>Ошибка безопасности (локальный файл)</strong><br><br>" +
        "Доступ к микрофону заблокирован, так как виджет запущен как файл (file://).<br><br>" +
        "<strong>Как исправить в Streamlabs:</strong><br>" +
        "1. Зайдите в свойства источника «Браузер» в Streamlabs.<br>" +
        "2. Найдите пункт <strong>Page permissions</strong> (Разрешения страницы).<br>" +
        "3. Переключите его с «No access» на <strong>Read user media</strong> (или Advanced) и перезапустите источник."
      );
    } else {
      showError(
        "<strong>Доступ к микрофону заблокирован</strong><br><br>" +
        "В свойствах источника «Браузер» в Streamlabs измените параметр <strong>Page permissions</strong> на <strong>Read user media</strong>."
      );
    }
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      audio: { 
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      } 
    });
    await setupAudio(stream);
    hideButton();
  } catch(e) {
    showError(
      "<strong>Не удалось получить доступ к звуку</strong><br><br>" +
      "Ошибка: " + e.message + "<br><br>" +
      "<strong>Решение:</strong> В настройках источника «Браузер» в Streamlabs измените <strong>Page permissions</strong> на <strong>Read user media</strong>."
    );
  }
}

async function setupAudio(stream) {
  try {
    const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioCtxClass();
    
    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }
    
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.7;
    
    timeData = new Uint8Array(analyser.fftSize);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    
    isRunning = true;
    resizeCanvases();
    draw();
  } catch (err) {
    showError("Ошибка настройки звукового узла: " + err.message);
  }
}

function drawWave() {
  if (!isRunning || !timeData) return;
  
  analyser.getByteTimeDomainData(timeData);
  
  const ctx = waveCanvas.getContext('2d');
  const w = waveCanvas.width;
  const h = waveCanvas.height;
  
  ctx.clearRect(0, 0, w, h);
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#00e5ff';
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  
  const sliceWidth = w / timeData.length;
  let x = 0;
  
  for (let i = 0; i < timeData.length; i++) {
    const v = timeData[i] / 128.0;
    const y = v * h / 2;
    
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    
    x += sliceWidth;
  }
  
  ctx.lineTo(w, h / 2);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawSpectrum() {
  if (!isRunning || !freqData) return;
  
  const ctx = spectrumCanvas.getContext('2d');
  const w = spectrumCanvas.width;
  const h = spectrumCanvas.height;
  
  analyser.getByteFrequencyData(freqData);
  
  ctx.clearRect(0, 0, w, h);
  
  const barWidth = (w / freqData.length) * 2.5;
  let x = 0;
  let peakValue = -Infinity;
  
  for (let i = 0; i < freqData.length; i++) {
    const barHeight = (freqData[i] / 255) * h;
    
    const gradient = ctx.createLinearGradient(0, h, 0, h - barHeight);
    gradient.addColorStop(0, 'rgba(0, 229, 255, 0.3)');
    gradient.addColorStop(0.5, 'rgba(0, 229, 255, 0.7)');
    gradient.addColorStop(1, '#00e5ff');
    
    ctx.fillStyle = gradient;
    ctx.fillRect(x, h - barHeight, barWidth - 1, barHeight);
    
    if (freqData[i] > peakValue) peakValue = freqData[i];
    
    x += barWidth;
    if (x > w) break;
  }
  
  if (peakValue > 0) {
    const db = Math.round(20 * Math.log10(peakValue / 255));
    peakEl.textContent = `PEAK: ${db} dB`;
    if (db > -3) peakEl.style.color = '#ff5252';
    else if (db > -10) peakEl.style.color = '#ffb74d';
    else peakEl.style.color = '#00e5ff';
  } else {
    peakEl.textContent = `PEAK: -∞ dB`;
    peakEl.style.color = '#00e5ff';
  }
}

function draw() {
  if (!isRunning) return;
  drawWave();
  drawSpectrum();
  requestAnimationFrame(draw);
}

window.addEventListener('resize', resizeCanvases);

window.addEventListener('DOMContentLoaded', () => {
  resizeCanvases();
  autoInit();
});
</script>
</body>
</html>
