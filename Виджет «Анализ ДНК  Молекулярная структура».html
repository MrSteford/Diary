<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body {
    width: 400px;
    height: 1080px;
    background: transparent;
    overflow: hidden;
    position: relative;
  }
  
  .dna-container {
    position: absolute;
    top: 50%;
    left: 60px;
    transform: translateY(-50%);
    width: 120px;
    height: 400px;
    animation: rotate3d 8s linear infinite;
    transform-style: preserve-3d;
    perspective: 400px;
  }
  
  .strand {
    position: absolute;
    width: 2px;
    height: 100%;
    background: linear-gradient(to bottom, #00e5ff, #ff5252, #00e5ff);
    left: 10px;
    box-shadow: 0 0 8px rgba(0,229,255,0.5);
    opacity: 0.7;
  }
  .strand.right { left: auto; right: 10px; }
  
  .rung {
    position: absolute;
    width: 100%;
    height: 1px;
    background: rgba(0,229,255,0.3);
    left: 0;
    box-shadow: 0 0 4px rgba(0,229,255,0.3);
  }
  
  @keyframes rotate3d {
    0% { transform: translateY(-50%) rotateY(0deg); }
    100% { transform: translateY(-50%) rotateY(360deg); }
  }
  
  .label-tag {
    position: absolute;
    left: 20px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: rgba(0,229,255,0.6);
    text-shadow: 0 0 4px #000;
    letter-spacing: 1px;
  }
  
  .hex-marker {
    position: absolute;
    width: 16px; height: 9px;
    border-left: 1px solid rgba(0,229,255,0.4);
    border-right: 1px solid rgba(0,229,255,0.4);
  }
  .hex-marker::before, .hex-marker::after {
    content: '';
    position: absolute;
    width: 11px; height: 11px;
    border: 1px solid rgba(0,229,255,0.4);
    transform: rotate(45deg);
  }
  .hex-marker::before { top: -5px; left: 2px; border-bottom: none; border-right: none; }
  .hex-marker::after { bottom: -5px; left: 2px; border-top: none; border-left: none; }
</style>
</head>
<body>
  <div class="dna-container" id="dna">
    <div class="strand left"></div>
    <div class="strand right"></div>
  </div>
  <div class="label-tag" style="top:25%; left:30px;">GEN-SEQ</div>
  <div class="label-tag" style="top:35%; left:180px;">A-T</div>
  <div class="label-tag" style="top:50%; left:150px;">G-C</div>
  <div class="label-tag" style="top:65%; left:30px;">T-A</div>
  <div class="hex-marker" style="top:30%; left:50px;"></div>
  <div class="hex-marker" style="top:55%; left:170px;"></div>
  <div class="hex-marker" style="top:70%; left:80px;"></div>

<script>
const dna = document.getElementById('dna');
for (let i = 0; i < 20; i++) {
  const rung = document.createElement('div');
  rung.className = 'rung';
  rung.style.top = (i * 5) + '%';
  dna.appendChild(rung);
}
</script>
</body>
</html>
